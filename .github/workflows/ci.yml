name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  test:
    name: Lint, format, and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out the exact source commit
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          ref: ${{ env.COMMIT_SHA }}
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Install uv
        run: python -m pip install uv==0.11.25
      - name: Install locked development dependencies
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check .
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Test
        run: uv run pytest

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - name: Check out the exact source commit
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          ref: ${{ env.COMMIT_SHA }}
      - name: Validate with Hassfest
        uses: home-assistant/actions/hassfest@e3fb68ebda13d88a0d695082f471ba2c83d025fb # master, 2026-07-21

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out the exact source commit
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          ref: ${{ env.COMMIT_SHA }}
      - name: Validate HACS repository
        uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa # main, 2026-07-19
        with:
          category: integration
          comment: false
          # HACS reads license metadata from the default branch. The PR checks
          # the reviewed LICENSE file below; the push-to-main run verifies the
          # repository metadata after merge.
          ignore: ${{ github.event_name == 'pull_request' && 'brands topics license' || 'brands topics' }}
      - name: Verify reviewed license file
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          test -f LICENSE
          grep -qx 'MIT License' LICENSE

  package:
    name: Package exact commit
    needs:
      - test
      - hassfest
    runs-on: ubuntu-latest
    steps:
      - name: Check out the exact source commit
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          ref: ${{ env.COMMIT_SHA }}
      - name: Build review artifact and checksum
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          (
            cd custom_components
            python -m zipfile -c \
              "../dist/wait_for_wolt-${COMMIT_SHA}.zip" \
              wait_for_wolt
          )
          (
            cd dist
            sha256sum "wait_for_wolt-${COMMIT_SHA}.zip" > "wait_for_wolt-${COMMIT_SHA}.sha256"
            printf 'commit=%s\n' "${COMMIT_SHA}" > "wait_for_wolt-${COMMIT_SHA}.metadata"
          )
      - name: Upload review artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wait_for_wolt-${{ env.COMMIT_SHA }}
          path: dist/
          if-no-files-found: error
          retention-days: 14
